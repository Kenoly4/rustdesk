name: Custom RustDesk Windows Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1) Repository holen
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master        # baut IMMER deine aktuelle Version
          fetch-depth: 0     # wichtig für Submodule & Flutter

      # 2) Rust installieren
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 3) Flutter installieren
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 4) Windows Desktop aktivieren
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

   

      # 6) Deine Konfiguration einbauen
      - name: Inject custom server config
        run: |
          (Get-Content flutter/lib/config.dart).Replace(
            "public.rustdesk.org",
            "172.20.1.3"
          ).Replace(
            "DEFAULT_PUBLIC_KEY",
            "OEd8rkAl27yqwPYFleHfaTd5RjTpRMcygephm1UCw0c="
          ) | Set-Content flutter/lib/config.dart

      # 7) Dependencies holen
      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: flutter

      # 8) Windows Build
      - name: Build RustDesk Windows Release
        run: flutter build windows --release
        working-directory: flutter

      # 9) Artefakt hochladen
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Custom-Windows
          path: flutter/build/windows/runner/Release/
