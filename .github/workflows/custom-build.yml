name: Custom RustDesk Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository (stable RustDesk version)
        uses: actions/checkout@v3
        with:
          ref: v1.1.10

      - name: Install Flutter (compatible version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.13.0"   # Kompatibel mit RustDesk 1.1.10

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Get Dependencies
        run: flutter pub get
        working-directory: flutter

      - name: Build RustDesk Windows
        run: flutter build windows --release
        working-directory: flutter

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows
          path: flutter/build/windows/runner/Release/
